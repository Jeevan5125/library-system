apiVersion: apps/v1
kind: Deployment
metadata:
  name: stock-alert-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: stock-alert-system
  template:
    metadata:
      labels:
        app: stock-alert-system
    spec:
      containers:
        - name: stock-alert-container
          image: jeevan5125/java-test-app:latest
          ports:
            - containerPort: 8080