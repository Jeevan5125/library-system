apiVersion: apps/v1
kind: Deployment
metadata:
  name: library-system-deployment
  labels:
    app: library-system
spec:
  replicas: 2
  selector:
    matchLabels:
      app: library-system
  template:
    metadata:
      labels:
        app: library-system
    spec:
      containers:
        - name: library-system
          image: jeevan5125/library-system:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: library-system-service
spec:
  type: NodePort
  selector:
    app: library-system
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
      nodePort: 30009